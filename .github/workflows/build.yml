name: Build FNF Web Port

on:
  workflow_dispatch:
    inputs:
      mod_url:
        description: 'Direct URL to your mod .zip file (Google Drive, Dropbox, MediaFire, Discord, etc.)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Base Engine
        uses: actions/checkout@v4
        with:
          repository: 'ShadowMario/FNF-PsychEngine'
          path: 'engine-source'

      - name: Download Mod Payload
        run: |
          echo "Downloading mod from URL provided..."
          pip install gdown --quiet
          
          URL="${{ github.event.inputs.mod_url }}"
          
          if [[ "$URL" == *"drive.google.com"* ]]; then
            gdown "$URL" -O mod-payload.zip
          else
            wget -q -O mod-payload.zip "$URL"
          fi
          
          echo "Extracting Mod Payload..."
          mkdir -p mods_upload
          unzip -q mod-payload.zip -d mods_upload/
          rm mod-payload.zip

      - name: Inject Mods into Engine
        run: |
          cd engine-source
          mkdir -p mods
          # Inject the uploaded mod files into the target directories
          cp -rn ../mods_upload/* mods/ || true
          cp -rn ../mods_upload/* assets/ || true

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.2.5

      - name: Install Haxelibs and Dependencies
        run: |
          cd engine-source
          haxelib setup ~/haxelib
          haxelib install hmm --quiet
          
          # Force overwrite the engine's hmm.json with our working web-port version
          cat << 'EOF' > hmm.json
          {
            "dependencies": [
              { "name": "lime", "type": "haxelib", "version": "8.1.2" },
              { "name": "openfl", "type": "haxelib", "version": "9.3.3" },
              { "name": "flixel", "type": "haxelib", "version": "5.6.1" },
              { "name": "flixel-addons", "type": "haxelib", "version": "3.2.2" },
              { "name": "flixel-ui", "type": "haxelib", "version": "2.6.1" },
              { "name": "hscript-iris", "type": "haxelib", "version": "1.0.2" },
              { "name": "tjson", "type": "haxelib", "version": "1.4.0" },
              { "name": "hxdiscord_rpc", "type": "haxelib", "version": "1.2.4" },
              { "name": "flxanimate", "type": "haxelib", "version": "3.0.4" }
            ]
          }
          EOF
          
          # Run the installer
          haxelib run hmm install --quiet
          
          # Direct backup safety install for flxanimate just in case
          haxelib install flxanimate 3.0.4 --quiet
      
      - name: Patch HTML5 incompatible code (Mock Sys)
        run: |
          cd engine-source
          echo 'class FileSystem { public static function absolutePath(path:String) return path; public static function exists(path:String) return false; public static function readDirectory(path:String):Array<String> return []; public static function isDirectory(path:String) return false; public static function stat(path:String) return null; public static function fullPath(path:String) return path; public static function createDirectory(path:String) {} public static function deleteFile(path:String) {} public static function deleteDirectory(path:String) {} }' > source/FileSystem.hx
          echo 'class File { public static function getContent(path:String) return ""; public static function getBytes(path:String) return null; public static function saveContent(path:String, c:String) return; public static function saveBytes(path:String, b:Dynamic) return; public static function copy(s:String, d:String) {} }' > source/File.hx
          echo 'class Sys { public static function exit(code:Int) {} public static function sleep(t:Float) {} public static function command(c:String, ?a:Array<String>) return 0; public static function args():Array<String> return []; public static function getCwd() return ""; public static function setCwd(s:String) {} public static function print(v:Dynamic) {} public static function println(v:Dynamic) {} public static function environment() return new haxe.ds.StringMap<String>(); public static function getEnv(s:String) return ""; public static function programPath() return ""; }' > source/Sys.hx
          echo 'class Process { public var stdout:Dynamic; public var stderr:Dynamic; public function new(c:String, ?a:Dynamic) { stdout = { readAll: function() return { toString: function() return "" }, readLine: function() return "" }; stderr = stdout; } public function exitCode(b:Bool=true) return 0; public function close() {} }' > source/Process.hx
          
          # Create a fake sys.thread structure to completely neutralize FixedThreadPool crashes on HTML5
          mkdir -p source/sys/thread
          echo 'package sys.thread; class Thread { public static function create(f:Void->Void) { f(); } public static function readMessage(b:Bool) return null; public static function sendMessage(m:Dynamic) {} }' > source/sys/thread/Thread.hx
          echo 'package sys.thread; class Mutex { public function new() {} public function acquire() {} public function release() {} }' > source/sys/thread/Mutex.hx
          echo 'package sys.thread; class FixedThreadPool { public function new(threads:Int) {} public function run(f:Void->Void) { f(); } public function shutdown() {} }' > source/sys/thread/FixedThreadPool.hx
          
          # Force remove all desktop-only native libraries from the configuration file
          sed -i -e '/discord_rpc/d' -e '/discord-rpc/d' -e '/linc_luajit/d' -e '/hxVideoEngine/d' -e '/extension-webkit/d' Project.xml || true
          mkdir -p source/hxdiscord_rpc
          echo 'package hxdiscord_rpc; class Discord { public static function Initialize(a:String,b:Bool,c:Dynamic){} public static function Shutdown(){} public static function RunCallbacks(){} public static function UpdatePresence(a:Dynamic){} public static function ClearPresence(){} }' > source/hxdiscord_rpc/Discord.hx
          echo 'package hxdiscord_rpc; class Types { public static inline var DISCORD_REPLY_NO=0; public static inline var DISCORD_REPLY_YES=1; public static inline var DISCORD_REPLY_IGNORE=2; }' > source/hxdiscord_rpc/Types.hx
          echo 'package hxdiscord_rpc; typedef DiscordPresence = Dynamic;' > source/hxdiscord_rpc/DiscordPresence.hx

          # Clean up the global import definitions and source files to strip explicit 'sys.thread' paths
          find source -name "*.hx" -type f -exec sed -i -e 's/sys\.FileSystem/FileSystem/g' \
                                                           -e 's/sys\.io\.File/File/g' \
                                                           -e 's/sys\.io\.Process/Process/g' \
                                                           -e 's/sys\.thread\.FixedThreadPool/Dynamic/g' \
                                                           -e 's/sys\.thread\.Thread/Dynamic/g' \
                                                           -e 's/sys\.thread\.Mutex/Dynamic/g' \
                                                           -e 's/import sys\.thread\./\/\/ import sys.thread./g' \
                                                           -e '/import cpp/d' \
                                                           -e 's/cpp\.[a-zA-Z0-9_]+/Dynamic/g' \
                                                           -e '/import llua/d' \
                                                           -e 's/llua\.[a-zA-Z0-9_]+/Dynamic/g' {} +
          find . -name "FlxSoundTray.hx" -type f -exec sed -i 's/public function new(/public function showIncrement() { show(); } public function showDecrement() { show(); }\n\n&/g' {} +
      
      - name: Optimization & Web Compile Build
        run: |
          cd engine-source
          set -e
          # Removed the reserved target.html5 flag
          haxelib run lime build html5 -release -D DISCORD_DISABLE -D NO_PRELOAD_ALL -D no_threads -D hscriptPos
