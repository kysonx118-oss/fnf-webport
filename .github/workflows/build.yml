name: Build FNF Web Port

on:
  workflow_dispatch:
    inputs:
      mod_url:
        description: 'Direct URL to your mod .zip file (Google Drive, Dropbox, MediaFire, Discord, etc.)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Base Engine
        uses: actions/checkout@v4
        with:
          repository: 'ShadowMario/FNF-PsychEngine'
          path: 'engine-source'

      - name: Download Mod Payload
        run: |
          echo "Downloading mod from URL provided..."
          pip install gdown --quiet
          
          URL="${{ github.event.inputs.mod_url }}"
          
          if [[ "$URL" == *"drive.google.com"* ]]; then
            gdown "$URL" -O mod-payload.zip
          else
            wget -q -O mod-payload.zip "$URL"
          fi
          
          echo "Extracting Mod Payload..."
          mkdir -p mods_upload
          unzip -q mod-payload.zip -d mods_upload/
          rm mod-payload.zip

      - name: Inject Mods into Engine
        run: |
          cd engine-source
          mkdir -p mods
          # Inject the uploaded mod files into the target directories
          cp -rn ../mods_upload/* mods/ || true
          cp -rn ../mods_upload/* assets/ || true

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.2.5

      - name: Install Haxelibs and Dependencies
        run: |
          cd engine-source
          haxelib setup ~/haxelib
          haxelib install hmm --quiet
          
          # Create a fallback hmm.json if it doesn't exist
          if [ ! -f hmm.json ]; then
            echo '{"dependencies": [{"name": "lime", "type": "haxelib", "version": "8.1.2"},{"name": "openfl", "type": "haxelib", "version": "9.3.3"},{"name": "flixel", "type": "haxelib", "version": "5.6.1"},{"name": "flixel-addons", "type": "haxelib", "version": "3.2.2"},{"name": "flixel-ui", "type": "haxelib", "version": "2.6.1"},{"name": "hscript-iris", "type": "haxelib", "version": "1.1.0"},{"name": "tjson", "type": "haxelib", "version": "1.4.0"}]}' > hmm.json
          fi
          
          haxelib run hmm install --quiet

      - name: Upload Web Export
        uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: web_export.zip

      - name: Auto-Publish to GitHub Branch
        run: |
          cd engine-source/export/release/html5/bin
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated Web Port Build"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:web-build
