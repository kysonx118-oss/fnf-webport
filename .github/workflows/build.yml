name: Build FNF Web Port

on:
  workflow_dispatch:
    inputs:
      mod_url:
        description: 'Direct URL to your mod .zip file (Google Drive, Dropbox, MediaFire, Discord, etc.)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Base Engine
        uses: actions/checkout@v4
        with:
          repository: 'ShadowMario/FNF-PsychEngine'
          path: 'engine-source'

      - name: Download Mod Payload
        run: |
          echo "Downloading mod from URL provided..."
          pip install gdown --quiet
          
          URL="${{ github.event.inputs.mod_url }}"
          
          if [[ "$URL" == *"drive.google.com"* ]]; then
            gdown "$URL" -O mod-payload.zip
          else
            wget -q -O mod-payload.zip "$URL"
          fi
          
          echo "Extracting Mod Payload..."
          mkdir -p mods_upload
          unzip -q mod-payload.zip -d mods_upload/
          rm mod-payload.zip

      - name: Inject Mods into Engine
        run: |
          cd engine-source
          mkdir -p mods
          # Inject the uploaded mod files into the target directories
          cp -rn ../mods_upload/* mods/ || true
          cp -rn ../mods_upload/* assets/ || true

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.2.5

      - name: Install Haxelibs and Dependencies
        run: |
          cd engine-source
          haxelib setup ~/haxelib
          haxelib install hmm --quiet
          
          # Create a fallback hmm.json including hxdiscord_rpc
          if [ ! -f hmm.json ]; then
            echo '{"dependencies": [{"name": "lime", "type": "haxelib", "version": "8.1.2"},{"name": "openfl", "type": "haxelib", "version": "9.3.3"},{"name": "flixel", "type": "haxelib", "version": "5.6.1"},{"name": "flixel-addons", "type": "haxelib", "version": "3.2.2"},{"name": "flixel-ui", "type": "haxelib", "version": "2.6.1"},{"name": "hscript-iris", "type": "haxelib", "version": "1.1.0"},{"name": "tjson", "type": "haxelib", "version": "1.4.0"},{"name": "hxdiscord_rpc", "type": "haxelib", "version": "1.2.4"}]}' > hmm.json
          fi
          
          haxelib run hmm install --quiet
      
      - name: Install Haxelibs and Dependencies
        run: |
          cd engine-source
          haxelib setup ~/haxelib
          haxelib install hmm --quiet
          
          # Create a clean, multi-line hmm.json file
          if [ ! -f hmm.json ]; then
            cat << 'EOF' > hmm.json
            {
              "dependencies": [
                { "name": "lime", "type": "haxelib", "version": "8.1.2" },
                { "name": "openfl", "type": "haxelib", "version": "9.3.3" },
                { "name": "flixel", "type": "haxelib", "version": "5.6.1" },
                { "name": "flixel-addons", "type": "haxelib", "version": "3.2.2" },
                { "name": "flixel-ui", "type": "haxelib", "version": "2.6.1" },
                { "name": "hscript-iris", "type": "haxelib", "version": "1.1.0" },
                { "name": "tjson", "type": "haxelib", "version": "1.4.0" },
                { "name": "hxdiscord_rpc", "type": "haxelib", "version": "1.2.4" },
                { "name": "flxanimate", "type": "haxelib", "version": "3.0.4" }
              ]
            }
          EOF
          fi
          
          haxelib run hmm install --quiet
      - name: Package Flat ZIP & Standardize output
        run: |
          # Dynamically locate the html5 bin folder wherever it was generated
          BIN_PATH=$(find engine-source/export -type d -name "bin" | grep "html5" | head -n 1)
          
          if [ -z "$BIN_PATH" ]; then
            echo "Error: Could not find the HTML5 export bin directory!"
            exit 1
          fi
          
          echo "Found build files at: $BIN_PATH"
          cd "$BIN_PATH"
          
          # Rename main engine JS file to funkin.js for easier jsDelivr/CDN embedding
          MAIN_JS=$(ls *.js | grep -E -v 'howler|pako' | head -n 1)
          if [ -n "$MAIN_JS" ] && [ "$MAIN_JS" != "funkin.js" ]; then
            mv "$MAIN_JS" funkin.js
            # Update index.html to use the new JS filename
            if [ -f "index.html" ]; then
              sed -i "s/$MAIN_JS/funkin.js/g" index.html
            fi
          fi
          
          # Ensure index.html exists fallback
          if [ ! -f "index.html" ]; then
            echo "<!DOCTYPE html><html><body><h1>FNF Web Build</h1><script src='funkin.js'></script></body></html>" > index.html
          fi
          
          # Zip the contents and output back to the root workspace directory
          zip -r "$GITHUB_WORKSPACE/web_export.zip" *
