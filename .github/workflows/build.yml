      - name: Optimization & Web Compile Build
        run: |
          cd engine-source
          set -e
          haxelib run lime build html5 -release -D DISCORD_DISABLE -D NO_PRELOAD_ALL -D no_threads -D hscriptPos

      - name: Package Flat ZIP & Standardize output
        run: |
          # Dynamically locate the html5 bin folder wherever it was generated
          BIN_PATH=$(find engine-source/export -type d -name "bin" | grep "html5" | head -n 1)
          if [ -z "$BIN_PATH" ]; then
            echo "Error: Could not find the HTML5 export bin directory!"
            exit 1
          fi
          cd "$BIN_PATH"
          
          # Rename main engine JS file to funkin.js for easier jsDelivr/CDN embedding
          MAIN_JS=$(ls *.js | grep -E -v 'howler|pako' | head -n 1)
          if [ -n "$MAIN_JS" ] && [ "$MAIN_JS" != "funkin.js" ]; then
            mv "$MAIN_JS" funkin.js
            if [ -f "index.html" ]; then
              sed -i "s/$MAIN_JS/funkin.js/g" index.html
            fi
          fi
          
          if [ ! -f "index.html" ]; then
            echo "<!DOCTYPE html><html><body><h1>FNF Web Build</h1><script src='funkin.js'></script></body></html>" > index.html
          fi
          
          zip -r "$GITHUB_WORKSPACE/web_export.zip" *

      - name: Upload Web Export
        uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: web_export.zip

      - name: Auto-Publish to GitHub Branch
        run: |
          BIN_PATH=$(find engine-source/export -type d -name "bin" | grep "html5" | head -n 1)
          cd "$BIN_PATH"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy FNF Web Port Build"
          git branch -M gh-pages
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push -u origin gh-pages --force
